<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Flashcard Sistema Nervoso</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
text-align:center;
padding:30px;
}

h1{
font-size:32px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

.card{
width:380px;
height:420px;
perspective:1000px;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
background:white;
border-radius:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
padding:20px;
}

.back{
transform:rotateY(180deg);
}

img{
width:180px;
margin:10px;
}

button{
font-size:18px;
padding:10px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
width:85%;
}

.answer{
background:#dbe3ff;
}

.answer:hover{
background:#b8c8ff;
}

.show{
background:#ffd966;
}

.flipbtn{
background:#9ad0ff;
}

.correct{
font-size:20px;
font-weight:bold;
margin-top:10px;
color:green;
}

</style>

</head>


<body>

<h1>Flashcard – Sistema Nervoso</h1>

<div class="container">

<!-- CARTA 1 -->

<div class="card" id="card1">

<div class="inner">

<div class="front">

<h2>Quale organo controlla il corpo?</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Human_brain.png">

<br>

<button class="flipbtn" onclick="flipCard('card1')">
Vedi risposte
</button>

</div>


<div class="back">

<h3>Scegli la risposta</h3>

<button class="answer">Cuore</button>
<button class="answer">Cervello</button>
<button class="answer">Polmoni</button>

<br>

<button class="show" onclick="showAnswer('a1','Cervello')">
Mostra risposta corretta
</button>

<div id="a1" class="correct"></div>

<button class="flipbtn" onclick="flipCard('card1')">
Torna alla domanda
</button>

</div>

</div>
</div>


<!-- CARTA 2 -->

<div class="card" id="card2">

<div class="inner">

<div class="front">

<h2>Come si chiamano le cellule del sistema nervoso?</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Complete_neuron_cell_diagram_it.svg">

<button class="flipbtn" onclick="flipCard('card2')">
Vedi risposte
</button>

</div>


<div class="back">

<h3>Scegli la risposta</h3>

<button class="answer">Neuroni</button>
<button class="answer">Muscoli</button>
<button class="answer">Ossa</button>

<button class="show" onclick="showAnswer('a2','Neuroni')">
Mostra risposta corretta
</button>

<div id="a2" class="correct"></div>

<button class="flipbtn" onclick="flipCard('card2')">
Torna alla domanda
</button>

</div>

</div>
</div>


<!-- CARTA 3 -->

<div class="card" id="card3">

<div class="inner">

<div class="front">

<h2>Quale parte collega cervello e corpo?</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/34/Spinal_cord_cross_section_it.svg">

<button class="flipbtn" onclick="flipCard('card3')">
Vedi risposte
</button>

</div>


<div class="back">

<h3>Scegli la risposta</h3>

<button class="answer">Midollo spinale</button>
<button class="answer">Stomaco</button>
<button class="answer">Polmoni</button>

<button class="show" onclick="showAnswer('a3','Midollo spinale')">
Mostra risposta corretta
</button>

<div id="a3" class="correct"></div>

<button class="flipbtn" onclick="flipCard('card3')">
Torna alla domanda
</button>

</div>

</div>
</div>


</div>


<script>

function flipCard(id){
document.getElementById(id).classList.toggle("flip")
}

function showAnswer(element,answer){
document.getElementById(element).innerHTML="✅ Risposta corretta: "+answer
}

</script>


</body>
</html>
